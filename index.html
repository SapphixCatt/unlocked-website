<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - My Files</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100vw;
        }

        .glow-cyan {
            color: #00ffff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7), 0 0 20px rgba(0, 255, 255, 0.5);
            margin: 25px 0;
            text-align: center;
        }

        #main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .game-selection-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        .game-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 12px;
            width: 220px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s, border-color 0.3s;
            position: relative;
            height: auto; /* Ensure card grows with text */
        }

        .game-card:hover {
            background: #1a1a1a;
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        #blank-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 2000000;
            display: none;
            flex-direction: column;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #blank-overlay.active { display: flex; }

        #blank-overlay.minimized {
            height: 48px !important;
            width: 320px !important;
            top: auto !important;
            bottom: 20px !important;
            left: auto !important;
            right: 20px !important;
            border-radius: 10px;
            border: 2px solid #00ffff;
            background: #111;
            overflow: hidden !important;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .overlay-nav {
            height: 48px;
            min-height: 48px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #333;
            justify-content: space-between;
            user-select: none;
        }

        .nav-btn {
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 900;
            transition: all 0.2s;
            text-transform: uppercase;
            border: none;
            color: white;
        }
        
        .btn-minimize { background-color: #2563eb !important; }
        .btn-close { background-color: #dc2626 !important; }

        .img-container {
            width: 90%;
            height: 130px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 12px;
            margin: 10px auto 0;
        }

        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Zoom-out utility for specific icons */
        .zoom-out-img img {
            object-fit: contain !important;
            padding: 12px !important;
        }

        .img-container svg { width: 60px; height: 60px; }

        .game-card span {
            font-weight: 600;
            font-size: 0.95rem;
            padding: 12px;
            text-align: center;
            text-transform: capitalize;
            display: block;
            word-wrap: break-word;
            white-space: normal; /* Allows text to wrap and be fully visible */
        }

        .dropdown-menu {
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: #1a1a1a; border: 1px solid #333; border-radius: 8px; margin-top: 8px; z-index: 9999; 
            display: block; visibility: hidden; opacity: 0;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        .game-card.active-dropdown { z-index: 10000; border-color: #00ffff; }
        .game-card.active-dropdown .dropdown-menu { visibility: visible; opacity: 1; transform: translateY(0) scale(1); }

        .dropdown-item { 
            padding: 12px; text-align: center; border-bottom: 1px solid #222; font-size: 13px; color: #ddd; transition: background 0.2s;
        }
        .dropdown-item:hover { background: #00ffff; color: #000; font-weight: bold; }

        #iframe-wrapper { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body onclick="closeAllDropdowns(event)">

    <div id="blank-overlay">
        <div class="overlay-nav">
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-pulse"></div>
                <span id="active-title" style="font-size: 11px; color: #fff; font-weight: 900; text-transform: uppercase;">HOME</span>
            </div>
            <div class="flex gap-2">
                <button id="minimize-btn" class="nav-btn btn-minimize" onclick="toggleMinimize()">Minimize</button>
                <button class="nav-btn btn-close" onclick="closeOverlay()">Close</button>
            </div>
        </div>
        <div id="iframe-wrapper">
            <iframe id="overlay-frame"></iframe>
        </div>
    </div>

    <main id="main-content">
        <h1 class="glow-cyan">Unblocked Games</h1>
        <div class="game-selection-container" id="gridContainer"></div>
        <h2 class="glow-cyan mt-12">Other Tools</h2>
        <div class="game-selection-container" id="otherContainer"></div>
    </main>

    <script>
        const games = [
            { id: 'slope', name: 'slope', url: "https://playslope.pages.dev/assets/Slope-Game-main/", img: "https://geometrylitepc.io/data/image/game/slope.jpg" },
            { 
                id: 'gd', name: 'geometry dash', img: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/322170/header.jpg",
                zoomOut: true,
                options: [
                    { name: 'Lite', url: 'https://geometrydash23.com/' },
                    { name: 'SubZero', url: 'https://lolygames.github.io/gd-zubero/' },
                    { name: 'Meltdown', url: 'https://geometrydashworld.online/' },
                    { name: 'World', url: 'https://geometrydashlite.io/geometry-dash-world' },
                    { name: 'Breeze', url: 'https://1games.io/game/geometry-dash-breeze/' }
                ]
            },
            { id: 'fnaf', name: 'Five Nights At Freddys', url: "https://dorukyum.github.io/FNAF-Web/", img: "https://static.wikia.nocookie.net/freddy-fazbears-pizza/images/d/da/FNaF1.jpg", zoomOut: true },
            { id: 'spaceWaves', name: 'space waves', url: "Games/Space Waves/spacewaves.html", img: "https://i.ytimg.com/vi/0L885f9nUI8/maxresdefault.jpg" },
            { id: 'amongUs', name: 'among us', url: "https://stgames.top/unity/amongus/", img: "https://assets.nintendo.com/image/upload/q_auto/f_auto/store/software/switch/70010000036098/758ab0b61205081da2466386940752c70e0e5ea43bd39e8b9b13eaa455c69b7e" },
            { id: 'stickmanHook', name: 'stickman hook', url: "https://spaedu23.github.io/g5/class-406/", img: "https://stickhook.io/data/image/game/stick-hook-game1.png" },
            { 
                id: 'minecraft', name: 'minecraft', img: "https://gaming-cdn.com/images/products/12567/orig-fallback-v1/minecraft-java-bedrock-edition-pc-cover.jpg",
                options: [
                    { name: 'Astra Client 1.6.0', url: './Games/Minecraft/Astra_Client_1.6.0.html' },
                    { name: 'EaglyMC 1.20', url: './Games/Minecraft/EaglyMC_1.20.html' },
                    { name: 'Pixel Client 1.8.8', url: './Games/Minecraft/Pixel_Client_1.8.8.html' },
                    { name: 'Pixel Client 1.12.2', url: './Games/Minecraft/Pixel_Client_1.12.2.html' },
                    { name: 'Release 1.8.8', url: './Games/Minecraft/Release_1.8.8.html' },
                    { name: 'Release 1.12.2', url: './Games/Minecraft/Release_1.12.2.html' },
                    { name: 'Resent Client 4.0', url: './Games/Minecraft/Resent_Client_4.0.html' },
                    { name: 'Resent Client 5.0', url: './Games/Minecraft/Resent_Client_5.0.html' },
                    { name: 'Tuff Client 1.12.2', url: './Games/Minecraft/Tuff_Client_1.12.2.html' }
                ]
            }
        ];

        const other = [
            { id: 'ai', name: 'Unlocks AI', url: "https://unlocks-ai-653511058784.europe-west2.run.app", svg: "bolt" },
            { id: 'movish', name: 'Movish', url: "https://movish.net", img: "https://movish.net/static/img/Movish.net.png" },
            { id: 'tmovie', name: 'TMovie', url: "https://www.tmovie.in", isTMovie: true },
            { id: 'tv', name: 'Live TV', url: 'https://tv247.us/', img: "https://cdn-icons-png.flaticon.com/512/716/716429.png" }
        ];

        function createCard(item, container) {
            const card = document.createElement('div');
            card.className = 'game-card';
            if(item.id) card.id = item.id;
            
            let extraClasses = '';
            if (item.zoomOut) extraClasses += ' zoom-out-img';

            let media = `<div class="img-container${extraClasses}">`;
            if (item.svg === "bolt") media += `<svg viewBox="0 0 24 24" fill="#FFD700"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`;
            else if (item.isTMovie) media += `<img src="https://www.wackybuttons.com/designcodes/0/110/1102136.png">`;
            else media += `<img src="${item.img}">`;
            media += `</div><span>${item.name}</span>`;
            card.innerHTML = media;

            if (item.options) {
                const drop = document.createElement('div');
                drop.className = 'dropdown-menu';
                item.options.forEach(o => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.innerText = o.name;
                    div.onclick = (e) => { e.stopPropagation(); run(o.url, o.name); };
                    drop.appendChild(div);
                });
                card.appendChild(drop);
            }

            card.onclick = (e) => {
                e.stopPropagation();
                if (item.options) {
                    const isActive = card.classList.contains('active-dropdown');
                    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active-dropdown'));
                    if (!isActive) card.classList.add('active-dropdown');
                } else run(item.url, item.name);
            };
            container.appendChild(card);
        }

        function run(url, title = "System") {
            const overlay = document.getElementById('blank-overlay');
            const frame = document.getElementById('overlay-frame');
            const titleEl = document.getElementById('active-title');
            
            overlay.classList.add('active');
            titleEl.innerText = title;
            frame.src = url;

            // Fix for keyboard input: focus the iframe as soon as it starts loading
            frame.onload = () => {
                frame.focus();
                // Ensure focus remains inside for games like Minecraft
                window.focus();
                frame.contentWindow.focus();
            };
        }

        function closeOverlay() {
            document.getElementById('blank-overlay').classList.remove('active');
            document.getElementById('overlay-frame').src = "about:blank";
        }

        function toggleMinimize() {
            document.getElementById('blank-overlay').classList.toggle('minimized');
            document.getElementById('minimize-btn').innerText = document.getElementById('blank-overlay').classList.contains('minimized') ? "Expand" : "Minimize";
        }

        function closeAllDropdowns(e) {
            if (!e.target.closest('.game-card')) document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active-dropdown'));
        }

        window.onload = () => {
            games.forEach(g => createCard(g, document.getElementById('gridContainer')));
            other.forEach(o => createCard(o, document.getElementById('otherContainer')));
        };
    </script>
</body>
</html>
